<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hytale Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hytale-bg: #15243a;
            --hytale-bg-dark: #0f1c30;
            --hytale-gold: #ecbc62;
            --hytale-gold-light: #ffe98d;
            --hytale-gold-dark: #e19f27;
            --hytale-blue: #203658;
            --hytale-border: #2f3a4e;
            --hytale-divider: #443e30;
            --text-primary: #ffffff;
            --text-secondary: #b7cedd;
            --success: #72aa5e;
            --danger: #b74545;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito Sans', sans-serif;
        }

        body {
            background-color: var(--hytale-bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2.5rem;
            line-height: 1.5;
            background-image: url('https://www.hytale.com/static/images/backgrounds/content-lower-480.jpg');
            background-attachment: fixed;
            background-size: cover;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
        }

        /* Hytale Container Style */
        .hytale-panel {
            background: linear-gradient(to bottom, #1a2d4a, #0f1c30);
            border: 1px solid var(--hytale-border);
            border-top: 2px solid var(--hytale-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 2px #4e5765;
            border-radius: 8px;
            position: relative;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .hytale-panel::before, .hytale-panel::after {
            position: absolute;
            content: "";
            display: block;
            width: 14px;
            height: 14px;
            background: url("https://www.hytale.com/static/images/container-corner.png") no-repeat 0 0;
            background-size: 14px;
            pointer-events: none;
        }

        .hytale-panel::before { top: 0; left: 0; transform: rotate(180deg); }
        .hytale-panel::after { top: 0; right: 0; transform: rotate(270deg); }

        .hytale-panel-inner::before, .hytale-panel-inner::after {
            position: absolute;
            content: "";
            display: block;
            width: 14px;
            height: 14px;
            background: url("https://www.hytale.com/static/images/container-corner.png") no-repeat 0 0;
            background-size: 14px;
            pointer-events: none;
        }

        .hytale-panel-inner::before { bottom: 0; left: 0; transform: rotate(90deg); }
        .hytale-panel-inner::after { bottom: 0; right: 0; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        h1, h2, h3 {
            font-family: 'Lexend', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: linear-gradient(var(--hytale-gold-light), var(--hytale-gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        h1 { font-size: 2rem; margin-bottom: 1rem; }
        h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }

        .refresh-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(236, 188, 98, 0.1);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: var(--hytale-gold);
            border: 1px solid rgba(236, 188, 98, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: #ebf7ff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--hytale-divider);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--hytale-gold);
            font-weight: 700;
            border-bottom: 1px solid var(--hytale-divider);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--hytale-border);
            vertical-align: middle;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            background: var(--hytale-bg-dark);
            object-fit: cover;
            border: 1px solid var(--hytale-gold-dark);
            padding: 2px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success { 
            background: rgba(114, 170, 94, 0.2); 
            color: #a3cf93;
            border: 1px solid rgba(114, 170, 94, 0.4);
        }

        .health-bar-container {
            width: 120px;
            height: 10px;
            background: #000000;
            border: 1px solid #334155;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(to bottom, #3c91c5, #225b8b);
            border-radius: 1px;
            transition: width 0.5s ease;
        }

        /* Hytale Button Style */
        .btn {
            position: relative;
            display: inline-block;
            box-sizing: border-box;
            padding: 4px 1.5rem;
            border-radius: 5px;
            border: 0;
            background: #816632;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            color: #d1dde4;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: linear-gradient(to bottom, #262d35, #121519);
            box-shadow: inset 0 0 0 2px #060b11, inset 0 0 0 3px rgba(127, 100, 49, 0.3);
        }

        .btn-danger {
            background: linear-gradient(to bottom, #b74545, #8a2e2e);
            box-shadow: inset 0 0 0 2px #060b11;
        }

        .btn-danger:hover {
            background: linear-gradient(to bottom, #c95454, #a33838);
        }

        #server-time {
            font-family: 'Lexend', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--hytale-gold);
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            border: 1px solid var(--hytale-divider);
        }

        .search-input {
            background: #000000;
            border: 1px solid var(--hytale-border);
            border-radius: 4px;
            padding: 0.6rem 1rem;
            color: white;
            font-size: 0.875rem;
            width: 280px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--hytale-gold);
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a172f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(var(--hytale-gold-light), var(--hytale-gold-dark));
            -webkit-background-clip: text;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--hytale-gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .input-group input {
            width: 100%;
            background: #000;
            border: 1px solid var(--hytale-border);
            border-radius: 4px;
            padding: 0.875rem 1rem;
            color: white;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--hytale-gold);
            outline: none;
        }

        .error-message {
            color: #ff4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        /* Plugin Management Styles */
        .plugin-list {
            margin-top: 1rem;
        }

        .plugin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin-bottom: 0.5rem;
            border-left: 3px solid var(--hytale-gold-dark);
        }

        .broadcast-group {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .broadcast-group .search-input {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-card hytale-panel">
            <div class="hytale-panel-inner">
                <h1 data-text="Admin Access">Admin Access</h1>
                <form onsubmit="login(event)">
                    <div class="input-group">
                        <label>Dashboard Token</label>
                        <input type="password" id="token-input" placeholder="Enter your 16-char secret">
                    </div>
                    <button type="submit" class="btn btn-secondary" style="width: 100%">Authenticate</button>
                    <div id="login-error" class="error-message">Invalid token. Please check your config.json</div>
                </form>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="hytale-panel" style="padding: 1rem 2rem; margin-bottom: 0">
                <div class="hytale-panel-inner" style="display: flex; align-items: center; gap: 2rem">
                    <h1 style="margin-bottom: 0; line-height: 1">Hytale Admin</h1>
                    <div id="server-time">Loading server time...</div>
                </div>
            </div>
            
            <div class="hytale-panel" style="padding: 1rem 2rem; margin-bottom: 0">
                <div class="hytale-panel-inner" style="display: flex; align-items: center; gap: 1rem">
                    <div class="refresh-pill">
                        <span class="pulse"></span>
                        Live Connection
                    </div>
                    <button class="btn btn-secondary" onclick="fetchStats()">Refresh</button>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card hytale-panel">
                <div class="hytale-panel-inner">
                    <div class="stat-label">Players Online</div>
                    <div id="player-count" class="stat-value">0</div>
                </div>
            </div>
            <div class="stat-card hytale-panel">
                <div class="hytale-panel-inner">
                    <div class="stat-label">Server TPS</div>
                    <div id="server-tps" class="stat-value">30.0</div>
                </div>
            </div>
            <div class="stat-card hytale-panel">
                <div class="hytale-panel-inner">
                    <div class="stat-label">Active Mods</div>
                    <div id="mod-count" class="stat-value">0</div>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem">
            <div class="main-card hytale-panel">
                <div class="hytale-panel-inner">
                    <div class="card-header">
                        <h2>Connected Players</h2>
                        <input type="text" id="search" class="search-input" placeholder="Search player name...">
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Status</th>
                                <th>Health</th>
                                <th>Location</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="player-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="side-panel">
                <div class="hytale-panel">
                    <div class="hytale-panel-inner">
                        <div class="card-header">
                            <h2>Server Broadcast</h2>
                        </div>
                        <div style="padding: 1.5rem">
                            <p style="color: var(--text-secondary); font-size: 0.8125rem; margin-bottom: 1rem">Send a message to all players on the server.</p>
                            <div class="broadcast-group">
                                <input type="text" id="broadcast-msg" class="search-input" placeholder="Message content...">
                                <button class="btn btn-secondary" onclick="broadcast()">Send</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="hytale-panel" style="margin-top: 2rem">
                    <div class="hytale-panel-inner">
                        <div class="card-header">
                            <h2>Custom Mods</h2>
                        </div>
                        <div id="plugin-list" class="plugin-list" style="padding: 1rem"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allPlayers = [];
        let dashboardToken = localStorage.getItem('hytale_admin_token');
        const avatarCache = new Map();

        function login(event) {
            if (event) event.preventDefault();
            const token = document.getElementById('token-input').value;
            if (!token) return;
            
            dashboardToken = token;
            // Verify token with a simple request
            fetchStats(true).then(success => {
                if (success) {
                    localStorage.setItem('hytale_admin_token', token);
                    document.getElementById('login-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 500);
                    startSync();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                    dashboardToken = null;
                }
            });
        }

        // Auto-login if token exists
        if (dashboardToken) {
            fetchStats(true).then(success => {
                if (success) {
                    document.getElementById('login-overlay').style.display = 'none';
                    startSync();
                } else {
                    localStorage.removeItem('hytale_admin_token');
                    dashboardToken = null;
                }
            });
        }

        function startSync() {
            setInterval(fetchStats, 2000);
            fetchStats();
            fetchMods();
        }

        async function fetchStats(isInit = false) {
            if (!dashboardToken) return false;

            try {
                // Fetch Players
                const pRes = await fetch('/api/players', {
                    headers: { 'X-Admin-Token': dashboardToken }
                });
                if (pRes.status === 401) return false;
                
                allPlayers = await pRes.json();
                renderPlayers();
                
                // Fetch Server Stats
                const sRes = await fetch('/api/stats', {
                    headers: { 'X-Admin-Token': dashboardToken }
                });
                const stats = await sRes.json();
                
                document.getElementById('player-count').textContent = stats.onlinePlayers;
                document.getElementById('server-tps').textContent = stats.tps.toFixed(1);
                // Color coding for TPS is handled via JS for better control
                const tpsEl = document.getElementById('server-tps');
                tpsEl.style.color = stats.tps > 18 ? '#a3cf93' : (stats.tps > 15 ? '#f4d06f' : '#b74545');

                updateServerTime();
                return true;
            } catch (e) {
                console.error('Failed to fetch stats', e);
                return false;
            }
        }

        function updateServerTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('server-time').textContent = 'SERVER TIME: ' + timeStr;
        }

        async function broadcast() {
            const msgInput = document.getElementById('broadcast-msg');
            const message = msgInput.value.trim();
            if (!message || !dashboardToken) return;

            try {
                const res = await fetch('/api/broadcast', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Token': dashboardToken
                    },
                    body: JSON.stringify({ message: message })
                });
                if (res.ok) {
                    msgInput.value = '';
                    alert('Broadcast sent!');
                }
            } catch (e) {
                alert('Failed to send broadcast');
            }
        }

        async function fetchMods() {
            if (!dashboardToken) return;
            try {
                const res = await fetch('/api/plugins', {
                    headers: { 'X-Admin-Token': dashboardToken }
                });
                const mods = await res.json();
                document.getElementById('mod-count').textContent = mods.length;
                const list = document.getElementById('plugin-list');
                list.innerHTML = '';
                mods.forEach(mod => {
                    const div = document.createElement('div');
                    div.className = 'plugin-item';
                    div.innerHTML = `
                        <span style="font-weight: 600">${mod.name}</span>
                        <span style="font-size: 0.75rem; color: var(--hytale-gold)">v${mod.version}</span>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to fetch mods', e);
            }
        }

        function renderPlayers() {
            const tbody = document.getElementById('player-table-body');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            const filtered = allPlayers.filter(p => p.name.toLowerCase().includes(searchTerm));
            const currentUuids = new Set(filtered.map(p => p.uuid));

            // Remove rows for players who are no longer in the filtered list
            Array.from(tbody.children).forEach(row => {
                const uuid = row.getAttribute('data-uuid');
                if (!currentUuids.has(uuid)) {
                    tbody.removeChild(row);
                }
            });

            filtered.forEach(p => {
                let tr = tbody.querySelector(`tr[data-uuid="${p.uuid}"]`);
                const healthPct = (p.health / p.maxHealth) * 100 || 0;
                const avatarUrl = p.avatarUrl || `/api/avatar/${p.name}`;

                if (!tr) {
                    // Create new row
                    tr = document.createElement('tr');
                    tr.setAttribute('data-uuid', p.uuid);
                    tr.innerHTML = `
                        <td>
                            <div class="player-info">
                                <img src="" class="avatar">
                                <div>
                                    <div class="p-name" style="font-weight: 600; font-size: 0.9375rem"></div>
                                    <div class="p-uuid-short" style="font-size: 0.75rem; color: var(--text-secondary); font-family: monospace"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge badge-success">
                                <span class="pulse"></span>
                                Online
                            </span>
                        </td>
                        <td>
                            <div class="p-vitals" style="font-size: 0.8125rem; font-weight: 600; margin-bottom: 2px"></div>
                            <div class="health-bar-container">
                                <div class="health-bar"></div>
                            </div>
                        </td>
                        <td>
                            <div class="p-coords" style="font-size: 0.8125rem; font-family: 'Monaco', monospace"></div>
                            <div class="p-gamemode" style="font-size: 0.6875rem; color: var(--text-secondary); margin-top: 2px"></div>
                        </td>
                        <td>
                            <div style="display: flex; gap: 0.5rem">
                                <button class="btn btn-secondary btn-inv">Inventory</button>
                                <button class="btn btn-danger btn-kick">Kick</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                    loadSecureAvatar(tr.querySelector('.avatar'), avatarUrl);
                    
                    // Add listeners for buttons in new row
                    tr.querySelector('.btn-inv').onclick = () => viewInv(p.uuid);
                    tr.querySelector('.btn-kick').onclick = () => kickPlayer(p.uuid);
                }

                // Update text fields only if they changed (or just always update, it's cheap)
                tr.querySelector('.p-name').textContent = p.name;
                tr.querySelector('.p-uuid-short').textContent = p.uuid.substring(0, 8) + '...';
                tr.querySelector('.p-vitals').textContent = `${Math.round(p.health)} / ${Math.round(p.maxHealth)} HP`;
                tr.querySelector('.health-bar').style.width = healthPct + '%';
                tr.querySelector('.p-coords').innerHTML = `
                    <span style="color: var(--accent)">X:</span> ${Math.round(p.x)} 
                    <span style="color: var(--accent)">Y:</span> ${Math.round(p.y)} 
                    <span style="color: var(--accent)">Z:</span> ${Math.round(p.z)}
                `;
                tr.querySelector('.p-gamemode').textContent = p.gameMode;
            });
        }

        async function loadSecureAvatar(img, url) {
            if (!dashboardToken) return;
            
            // Check cache first
            if (avatarCache.has(url)) {
                img.src = avatarCache.get(url);
                return;
            }

            try {
                const res = await fetch(url, {
                    headers: { 'X-Admin-Token': dashboardToken }
                });
                if (!res.ok) throw new Error('Failed to fetch avatar');
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                // Store in cache
                avatarCache.set(url, blobUrl);
                img.src = blobUrl;
            } catch (e) {
                console.error('Failed to load avatar securely:', e);
                // Fallback icon or empty
                img.src = 'https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(url);
            }
        }

        document.getElementById('search').addEventListener('input', renderPlayers);

        function viewInv(uuid) {
            alert('Opening inventory viewer for ' + uuid);
        }

        function kickPlayer(uuid) {
            const p = allPlayers.find(x => x.uuid === uuid);
            if (confirm(`Are you sure you want to kick ${p ? p.name : 'this player'}?`)) {
                fetch('/api/kick', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Token': dashboardToken
                    },
                    body: JSON.stringify({ uuid: uuid, reason: 'Kicked by Admin' })
                }).then(() => fetchStats());
            }
        }

        // Clock handled by updateServerTime during stats sync for simplicity,
        // but we can also run it independently for smoothness if needed.
        setInterval(updateServerTime, 1000);
    </script>
</body>
</html>
