<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hytale Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .player-list {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: #334155;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .badge-info { background: rgba(56, 189, 248, 0.1); color: var(--accent); }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        #refresh-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Admin Dashboard</h1>
                <p id="refresh-status">Auto-refreshing every 5s</p>
            </div>
            <div id="server-time">00:00:00</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Online Players</div>
                <div class="stat-value" id="count-online">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Server Uptime</div>
                <div class="stat-value" id="uptime">0h 0m</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">TPS</div>
                <div class="stat-value" id="tps">20.0</div>
            </div>
        </div>

        <div class="player-list">
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Inventory</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="player-table-body">
                    <!-- Players will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/players');
                const players = await response.json();
                renderPlayers(players);
                document.getElementById('count-online').textContent = players.length;
            } catch (e) {
                console.error('Failed to fetch stats', e);
            }
        }

        function renderPlayers(players) {
            const tbody = document.getElementById('player-table-body');
            tbody.innerHTML = '';
            
            players.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 600">${p.name}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary)">${p.uuid.substring(0, 8)}...</div>
                    </td>
                    <td><span class="badge badge-success">Online</span></td>
                    <td>${p.x}, ${p.y}, ${p.z}</td>
                    <td><button class="btn" style="background: #334155; color: white" onclick="viewInv('${p.uuid}')">View</button></td>
                    <td>
                        <button class="btn btn-danger" onclick="kickPlayer('${p.uuid}')">Kick</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewInv(uuid) {
            alert('Opening inventory viewer for ' + uuid);
            // Future: Modal with inventory grid
        }

        function kickPlayer(uuid) {
            if (confirm('Kick this player?')) {
                fetch('/api/kick', {
                    method: 'POST',
                    body: JSON.stringify({ uuid: uuid, reason: 'Kicked by Admin' })
                });
            }
        }

        setInterval(fetchStats, 5000);
        fetchStats();

        // Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('server-time').textContent = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
